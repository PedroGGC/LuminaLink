<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LuminaLink</title>
  <meta name="description" content="Encurte, rastreie e analise seus links com precisão." />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            // Minimalist semantic palette for Light Mode
            "bg-base": "#F9F8F6",
            "bg-surface": "#FFFFFF",
            "bg-muted": "#F3F1EC",
            "border-subtle": "#EAEAEA",
            "text-main": "#111111",
            "text-muted": "#787774",
            "accent-subtle": "#EDF3EC",
            "accent-text": "#346538",
            
            // Dark Mode equivalents (prefixed with d-)
            "d-bg-base": "#111111",
            "d-bg-surface": "#1A1A1A",
            "d-bg-muted": "#252525",
            "d-border-subtle": "#2E2E2E",
            "d-text-main": "#EDEDED",
            "d-text-muted": "#A0A0A0",
            "d-accent-subtle": "#1E2A1F",
            "d-accent-text": "#85C28B",
          },
          fontFamily: {
            "editorial": ["Newsreader", "Playfair Display", "serif"],
            "sans": ["'Geist Sans'", "'SF Pro Display'", "'Helvetica Neue'", "sans-serif"],
            "mono": ["'Geist Mono'", "'JetBrains Mono'", "monospace"],
          }
        }
      }
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-family: 'Material Symbols Outlined';
      font-weight: normal;
      font-style: normal;
      font-size: 24px;
      line-height: 1;
      letter-spacing: normal;
      text-transform: none;
      display: inline-block;
      white-space: nowrap;
      word-wrap: normal;
      direction: ltr;
      -webkit-font-smoothing: antialiased;
    }
    body {
      background-color: var(--bg-color, #FBFBFA);
      color: var(--text-color, #111111);
      transition: background-color 0.3s ease, color 0.3s ease;
    }
    html.dark body {
      --bg-color: #111111;
      --text-color: #EDEDED;
    }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 4px; }
    html.dark ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); }
    ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.2); }
    html.dark ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
  </style>
</head>
<body class="antialiased selection:bg-black selection:text-white dark:selection:bg-white dark:selection:text-black">
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
